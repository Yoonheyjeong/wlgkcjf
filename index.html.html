<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta charset="UTF-8" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노씨라이트 - 3D 지하철 문 안내 시뮬레이터</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #11151a;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #12161c 0%, #0c1015 100%);
    }

    canvas {
      display: block;
    }

    #webgl-error {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
      color: #333;
      z-index: 20;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #webgl-error .message {
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #d8d8d8;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      line-height: 1.6;
    }

    #start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 14, 18, 0.88);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #start-card {
      width: min(92vw, 520px);
      background: #151a20;
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
      border: 1px solid rgba(120, 160, 210, 0.12);
    }

    #start-card h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: #d7e7ff;
    }

    #start-card p {
      margin: 0 0 24px;
      color: #a4b5c8;
      line-height: 1.7;
      font-size: 1rem;
    }

    #start-button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #4d8dff 0%, #225bd6 100%);
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(34, 91, 214, 0.28);
    }

    #hint {
      margin-top: 14px;
      color: #7f93a9;
      font-size: 0.92rem;
    }

    #controls-ui {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 8;
      background: rgba(8, 12, 18, 0.78);
      color: #d9e6f7;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      backdrop-filter: blur(6px);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="webgl-error">
      <div class="message">
        <h2>WebGL을 초기화할 수 없습니다.</h2>
        <p>
          현재 브라우저 또는 기기에서 3D 그래픽을 사용할 수 없거나,
          WebGL이 비활성화되어 있습니다.
        </p>
      </div>
    </div>

    <div id="start-screen">
      <div id="start-card">
        <h1>노씨라이트</h1>
        <p>
          시각장애인과 저시력자가 지하철에서 문을 쉽게 찾고
          안전하게 들어갈 수 있도록 돕는 AI 스마트 글래스 콘셉트입니다.
        </p>
        <button id="start-button" type="button">체험 시작</button>
        <div id="hint">버튼을 누르면 시작 화면이 닫히고 3D 장면이 표시됩니다.</div>
      </div>
    </div>

    <div id="controls-ui">
      조작: W/A/S/D 또는 방향키 · 우클릭 드래그: 시점 회전
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const app = document.getElementById('app');
    const startScreen = document.getElementById('start-screen');
    const startButton = document.getElementById('start-button');
    const webglError = document.getElementById('webgl-error');

    let scene, camera, renderer;
    let clock = new THREE.Clock();
    let playerPosition = new THREE.Vector3(0, 1.65, 10);
    let yaw = 0;
    let pitch = 0;

    const moveState = { forward: false, backward: false, left: false, right: false };
    let isRotating = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    function isTypingTarget(target) {
      if (!target) return false;
      const tag = target.tagName ? target.tagName.toLowerCase() : '';
      return tag === 'input' || tag === 'textarea' || tag === 'select' || target.isContentEditable;
    }

    function isWebGLAvailable() {
      try {
        const canvas = document.createElement('canvas');
        return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
      } catch (e) {
        return false;
      }
    }

    function showWebGLError() {
      webglError.style.display = 'flex';
      startScreen.style.display = 'none';
    }

    function createCanvasTexture(drawFn, width = 512, height = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      drawFn(ctx, width, height);
      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = 4;
      texture.needsUpdate = true;
      return texture;
    }

    function makeMaterial(color, map = null, roughness = 0.85, metalness = 0.05) {
      const params = { color, roughness, metalness };
      if (map) params.map = map;
      return new THREE.MeshStandardMaterial(params);
    }

    function addBox(parent, w, h, d, material, x, y, z, rx = 0, ry = 0, rz = 0) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
      mesh.position.set(x, y, z);
      mesh.rotation.set(rx, ry, rz);
      parent.add(mesh);
      return mesh;
    }

    function createFloorTexture() {
      return createCanvasTexture((ctx, w, h) => {
        ctx.fillStyle = '#20242a';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#30353c';
        ctx.lineWidth = 5;
        const step = 64;
        for (let x = 0; x <= w; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, h);
          ctx.stroke();
        }
        for (let y = 0; y <= h; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }
      }, 512, 512);
    }

    function buildLongLobby() {
      const lobby = new THREE.Group();

      const floorTexture = createFloorTexture();
      floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
      floorTexture.repeat.set(4, 8);

      const floorMat = makeMaterial(0x262a30, floorTexture, 0.95, 0.02);
      const wallMat = makeMaterial(0x5f6670, null, 0.92, 0.02);
      const ceilingMat = makeMaterial(0x8a9198, null, 0.98, 0.01);
      const lightMat = makeMaterial(0xaeb7bf, null, 0.3, 0.0);

      addBox(lobby, 12, 0.2, 38, floorMat, 0, 0, 0);
      addBox(lobby, 12, 0.3, 38, ceilingMat, 0, 6, 0);
      addBox(lobby, 0.4, 5.6, 38, wallMat, -6, 2.8, 0);
      addBox(lobby, 0.4, 5.6, 38, wallMat, 6, 2.8, 0);

      for (let i = -2; i <= 2; i++) {
        addBox(lobby, 0.35, 0.08, 6.5, lightMat, 0, 5.7, i * 6);
      }

      return lobby;
    }

    function addTicketMachines(parent) {
      const machineBody = makeMaterial(0x6f7680, null, 0.75, 0.08);
      const screenMat = makeMaterial(0x182433, null, 0.35, 0.02);
      const accentMat = makeMaterial(0x94a7b8, null, 0.65, 0.05);

      const count = 5;
      const spacing = 2.55;
      const startX = -(spacing * (count - 1)) / 2;

      for (let i = 0; i < count; i++) {
        const machine = new THREE.Group();
        const x = startX + i * spacing;

        addBox(machine, 0.9, 2.2, 0.65, machineBody, 0, 1.1, 0);
        addBox(machine, 0.78, 0.42, 0.06, screenMat, 0, 1.65, 0.34);
        addBox(machine, 0.55, 0.08, 0.08, accentMat, 0, 0.95, 0.34);
        addBox(machine, 0.35, 0.55, 0.08, accentMat, 0, 0.5, 0.34);

        machine.position.set(x, 0, 0);
        parent.add(machine);
      }
    }

    function addEndStructure(parent) {
      const structure = new THREE.Group();
      const stairMat = makeMaterial(0x454b52, null, 0.95, 0.02);
      const lowerWallMat = makeMaterial(0x5f6670, null, 0.92, 0.02);
      const lowerCeilingMat = makeMaterial(0x8a9198, null, 0.98, 0.01);
      const lightMat = makeMaterial(0xaeb7bf, null, 0.3, 0.0);

      const stairs = new THREE.Group();
      const stairCount = 8;
      const stairWidth = 3.8;
      const stairStepDepth = 1.15;
      const stairStepDrop = 0.35;

      for (let i = 0; i < stairCount; i++) {
        addBox(stairs, stairWidth, 0.35, stairStepDepth, stairMat, 0, -i * stairStepDrop, -20.2 - i * stairStepDepth);
      }
      addBox(stairs, stairWidth + 0.2, 0.18, 0.7, makeMaterial(0x626970, null, 0.9, 0.02), 0, 0.1, -19.3);
      structure.add(stairs);

      const lowerHall = new THREE.Group();
      const lowerFloorTexture = createFloorTexture();
      lowerFloorTexture.wrapS = lowerFloorTexture.wrapT = THREE.RepeatWrapping;
      lowerFloorTexture.repeat.set(6, 12);
      const floorMat = makeMaterial(0x262a30, lowerFloorTexture, 0.95, 0.02);

      addBox(lowerHall, 22, 0.2, 28, floorMat, 0, -3.1, -32);
      addBox(lowerHall, 22, 0.3, 28, lowerCeilingMat, 0, 2.6, -32);
      addBox(lowerHall, 0.4, 5.6, 28, lowerWallMat, -11, -0.3, -32);
      addBox(lowerHall, 0.4, 5.6, 28, lowerWallMat, 11, -0.3, -32);
      addBox(lowerHall, 22, 5.6, 0.4, lowerWallMat, 0, -0.3, -46);

      addBox(lowerHall, 0.7, 2.8, 0.2, lowerWallMat, -9.8, 0.7, -32);
      addBox(lowerHall, 0.7, 2.8, 0.2, lowerWallMat, 9.8, 0.7, -32);

      addBox(lowerHall, 5.2, 2.4, 0.18, lowerWallMat, -5.8, 1.0, -45.8);
      addBox(lowerHall, 5.2, 2.4, 0.18, lowerWallMat, 5.8, 1.0, -45.8);

      const subway = new THREE.Group();
      const trainBody = makeMaterial(0x2e6fb8, null, 0.75, 0.08);
      const windowMat = makeMaterial(0x1b2636, null, 0.35, 0.02);
      const stripeMat = makeMaterial(0xf0f0f0, null, 0.4, 0.01);

      addBox(subway, 4.6, 3.0, 1.5, trainBody, -5.2, 1.3, -45.2);
      addBox(subway, 4.3, 1.1, 0.06, windowMat, -5.2, 1.7, -44.45);
      addBox(subway, 4.3, 0.16, 1.56, stripeMat, -5.2, 0.25, -45.2);

      addBox(subway, 4.6, 3.0, 1.5, trainBody, 5.2, 1.3, -45.2);
      addBox(subway, 4.3, 1.1, 0.06, windowMat, 5.2, 1.7, -44.45);
      addBox(subway, 4.3, 0.16, 1.56, stripeMat, 5.2, 0.25, -45.2);

      lowerHall.add(subway);

      for (let i = -4; i <= 4; i++) {
        addBox(lowerHall, 0.35, 0.08, 5.0, lightMat, i * 2.2, 2.3, -32);
      }

      structure.add(lowerHall);
      parent.add(structure);
    }

    function createScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x11151a);
      scene.fog = new THREE.Fog(0x11151a, 12, 70);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.copy(playerPosition);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      app.insertBefore(renderer.domElement, webglError);

      scene.add(new THREE.AmbientLight(0xffffff, 0.65));

      const directionalLight = new THREE.DirectionalLight(0xb9c4d0, 0.95);
      directionalLight.position.set(6, 12, 8);
      scene.add(directionalLight);

      const fillLight = new THREE.PointLight(0x667b92, 0.9, 140);
      fillLight.position.set(0, 4, -20);
      scene.add(fillLight);

      const lobby = buildLongLobby();
      addTicketMachines(lobby);
      addEndStructure(lobby);
      scene.add(lobby);

      updateCameraLook();
    }

    function updateCameraLook() {
      const dir = new THREE.Vector3(
        Math.cos(pitch) * Math.sin(yaw),
        Math.sin(pitch),
        -Math.cos(pitch) * Math.cos(yaw)
      );
      camera.lookAt(playerPosition.clone().add(dir));
    }

    function updateMovement(deltaTime) {
      if (startScreen.style.display !== 'none') return;

      const moveSpeed = 5.0;
      const dir = new THREE.Vector3();
      const forward = new THREE.Vector3(Math.sin(yaw), 0, -Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw), 0, Math.sin(yaw));

      if (moveState.forward) dir.add(forward);
      if (moveState.backward) dir.add(forward.clone().negate());
      if (moveState.left) dir.add(right.clone().negate());
      if (moveState.right) dir.add(right);

      if (dir.lengthSq() > 0) {
        dir.normalize();
        playerPosition.addScaledVector(dir, moveSpeed * deltaTime);
      }

      playerPosition.x = THREE.MathUtils.clamp(playerPosition.x, -6, 6);
      playerPosition.z = THREE.MathUtils.clamp(playerPosition.z, -46, 18);
      playerPosition.y = 1.65;
      camera.position.copy(playerPosition);
      updateCameraLook();
    }

    function onWindowResize() {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      updateMovement(clock.getDelta());
      if (scene && camera && renderer) renderer.render(scene, camera);
    }

    function startExperience() {
      startScreen.style.display = 'none';
      clock.getDelta();
    }

    window.addEventListener('keydown', (event) => {
      if (startScreen.style.display !== 'none') return;
      if (isTypingTarget(document.activeElement)) return;
      const key = event.key.toLowerCase();
      if (key === 'w' || event.key === 'ArrowUp') { moveState.forward = true; event.preventDefault(); }
      else if (key === 's' || event.key === 'ArrowDown') { moveState.backward = true; event.preventDefault(); }
      else if (key === 'a' || event.key === 'ArrowLeft') { moveState.left = true; event.preventDefault(); }
      else if (key === 'd' || event.key === 'ArrowRight') { moveState.right = true; event.preventDefault(); }
    });

    window.addEventListener('keyup', (event) => {
      const key = event.key.toLowerCase();
      if (key === 'w' || event.key === 'ArrowUp') moveState.forward = false;
      else if (key === 's' || event.key === 'ArrowDown') moveState.backward = false;
      else if (key === 'a' || event.key === 'ArrowLeft') moveState.left = false;
      else if (key === 'd' || event.key === 'ArrowRight') moveState.right = false;
    });

    window.addEventListener('keydown', (event) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) event.preventDefault();
    }, { passive: false });

    window.addEventListener('contextmenu', (event) => {
      if (startScreen.style.display !== 'none') return;
      event.preventDefault();
    });

    window.addEventListener('mousedown', (event) => {
      if (startScreen.style.display !== 'none') return;
      if (event.button === 2) {
        isRotating = true;
        lastMouseX = event.clientX;
        lastMouseY = event.clientY;
      }
    });

    window.addEventListener('mousemove', (event) => {
      if (!isRotating || startScreen.style.display !== 'none') return;
      const sensitivity = 0.0035;
      const dx = event.clientX - lastMouseX;
      const dy = event.clientY - lastMouseY;
      yaw -= dx * sensitivity;
      pitch -= dy * sensitivity;
      pitch = THREE.MathUtils.clamp(pitch, -Math.PI / 2 + 0.05, Math.PI / 2 - 0.05);
      lastMouseX = event.clientX;
      lastMouseY = event.clientY;
      updateCameraLook();
    });

    window.addEventListener('mouseup', (event) => {
      if (event.button === 2) isRotating = false;
    });

    if (!isWebGLAvailable()) {
      showWebGLError();
    } else {
      createScene();
      animate();
      window.addEventListener('resize', onWindowResize);
    }

    startButton.addEventListener('click', startExperience);
  </script>
</body>
</html>
